<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatDPT | AI Assistant</title>
    
    <link rel="stylesheet" href="./style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body class="bg-neutral-900 text-white flex flex-col h-screen overflow-hidden">

    <header class="p-4 border-b border-neutral-800 flex justify-between items-center bg-neutral-900/50 backdrop-blur-md z-10">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-white rounded-full flex items-center justify-center">
                <span class="text-black font-bold text-xs">DPT</span>
            </div>
            <h1 class="font-semibold text-lg tracking-tight">ChatDPT</h1>
        </div>
        <div class="text-xs text-neutral-500 font-mono">v1.0.4 - Groq Engine</div>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-6 container mx-auto max-w-3xl pb-32 pt-6 custom-scrollbar">
        <div class="flex flex-col items-center justify-center h-full text-center opacity-40 py-20">
            <div class="text-5xl mb-4">⚡</div>
            <h2 class="text-2xl font-bold">How can I help you today?</h2>
            <p class="max-w-xs text-sm mt-2">I can search the web using Tavily or process logic via Groq.</p>
        </div>
    </main>

    <footer class="fixed inset-x-0 bottom-0 bg-gradient-to-t from-neutral-900 via-neutral-900 to-transparent pb-8 pt-12 z-20">
        <div class="container mx-auto max-w-3xl px-4">
            <div class="bg-neutral-800 border border-neutral-700 rounded-3xl p-2 shadow-2xl focus-within:border-neutral-500 transition-all duration-300">
                
                <textarea 
                    id="input" 
                    class="w-full bg-transparent resize-none outline-none p-3 text-gray-200 placeholder-neutral-500 min-h-[50px] max-h-[200px]" 
                    rows="1" 
                    placeholder="Message ChatDPT..."></textarea>
                
                <div class="flex items-center justify-between px-3 pb-1 pt-1">
                    <div class="flex gap-2">
                        <span class="px-2 py-0.5 bg-neutral-700 text-[10px] rounded text-neutral-400 uppercase tracking-tighter">Web Search ON</span>
                    </div>
                    
                    <button id="ask" 
                        class="bg-white px-5 py-1.5 text-black rounded-full font-bold hover:bg-neutral-200 transition-all active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed"
                        disabled>
                        Ask
                    </button>
                </div>
            </div>
            <p class="text-[10px] text-center text-neutral-600 mt-3">
                ChatDPT can make mistakes. Check important info.
            </p>
        </div>
    </footer>

    <script src="./script.js"></script>
</body>
</html>
